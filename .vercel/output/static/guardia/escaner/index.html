<link rel="stylesheet" href="/_astro/bitacora.zYriFJRl.css"></head> <body class="min-h-screen bg-[#f9f9f9] text-[#1a1c1c]"> <div class="mx-auto flex min-h-[100dvh] w-full max-w-[430px] flex-col bg-[#f9f9f9]"> <header class="sticky top-0 z-40 flex items-center justify-between border-b border-[#ececec] bg-white/90 px-4 py-3 backdrop-blur"> <a href="#" class="grid h-10 w-10 place-items-center rounded-full text-[#213138] transition hover:bg-[#eeeeee]"> <span class="material-symbols-outlined">person</span> </a> <h2 class="text-lg font-bold tracking-tight text-[#213138]">Nauka Nayarit</h2> <a href="#" class="grid h-10 w-10 place-items-center rounded-full text-[#213138] transition hover:bg-[#eeeeee]"> <span class="material-symbols-outlined">notifications</span> </a> </header> <main class="flex-1 px-4 pb-24 pt-4">   <section class="mb-4 rounded-xl bg-white p-2 shadow-[0_6px_18px_rgba(26,28,28,0.05)]"> <div class="mb-2 rounded-lg bg-[#f3f3f4] p-2"> <button id="camera-permission" class="h-10 w-full rounded-lg bg-[#213138] text-sm font-semibold text-white">Activar camara</button> <p id="camera-status" class="mt-2 text-center text-xs font-semibold text-[#5f6368]">Camara no iniciada</p> </div> <div class="grid grid-cols-2 gap-2"> <button data-access-type="entrada" class="access-toggle h-11 rounded-lg bg-[#213138] text-base font-semibold text-white">Entrada</button> <button data-access-type="salida" class="access-toggle h-11 rounded-lg bg-[#eeeeee] text-base font-semibold text-[#213138]">Salida</button> </div> <div class="mt-2 grid grid-cols-2 gap-2"> <button data-qr-state="valido" class="qr-toggle h-11 rounded-lg bg-[#006d36] text-base font-semibold text-white">QR Valido</button> <button data-qr-state="invalido" class="qr-toggle h-11 rounded-lg bg-[#eeeeee] text-base font-semibold text-[#93000a]">QR Invalido</button> </div> </section> <section class="relative -mx-4 -mt-6 mb-6 h-[45vh] overflow-hidden bg-[#2f3131]"> <video id="camera-video" class="absolute inset-0 hidden h-full w-full object-cover" autoplay playsinline muted></video> <img id="camera-fallback" src="/_astro/491461670_17919450432084004_8291959886084544470_n.3SkptAsb.jpg" alt="camera bg" class="h-full w-full object-cover blur-sm brightness-75"> <div class="absolute inset-0 grid place-items-center"> <div class="relative h-64 w-64"> <div class="absolute left-0 top-0 h-12 w-12 rounded-tl-lg border-l-4 border-t-4 border-white/85"></div> <div class="absolute right-0 top-0 h-12 w-12 rounded-tr-lg border-r-4 border-t-4 border-white/85"></div> <div class="absolute bottom-0 left-0 h-12 w-12 rounded-bl-lg border-b-4 border-l-4 border-white/85"></div> <div class="absolute bottom-0 right-0 h-12 w-12 rounded-br-lg border-b-4 border-r-4 border-white/85"></div> <div class="absolute left-0 top-1/2 h-1 w-full bg-[#83fba5] shadow-[0_0_12px_2px_rgba(131,251,165,0.45)]"></div> </div> </div> </section> <section id="access-card" class="rounded-[14px] bg-white p-5 shadow-[0_8px_24px_rgba(26,28,28,0.06)]"> <div id="status-chip" class="mb-5 flex items-center gap-2 rounded-xl bg-[#83fba5]/20 p-3 text-[#006d36]"> <span class="material-symbols-outlined">check_circle</span> <h2 id="status-title" class="text-5xl font-bold tracking-[-0.01em]">Visitante Autorizado</h2> </div> <p class="text-sm font-bold uppercase tracking-[0.08em] text-[#5f6368]">Nombre</p> <p class="mt-1 text-5xl font-semibold text-[#213138]">Juan Perez</p> <hr class="my-4 border-[#eeeeee]"> <p class="text-sm font-bold uppercase tracking-[0.08em] text-[#5f6368]">Destino</p> <p class="mt-1 text-6xl font-extrabold tracking-[-0.02em] text-[#213138]">Lote A-22</p> <a id="access-action" href="/admin/detalle-movimiento" class="mt-6 flex h-14 w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-b from-[#006d36] to-[#005227] text-2xl font-semibold text-white"> <span class="material-symbols-outlined">login</span> <span id="action-label">Registrar entrada</span> </a> </section>  </main> <nav class="fixed bottom-0 left-1/2 z-50 flex h-20 w-full max-w-[430px] -translate-x-1/2 items-center justify-around border-t border-white/70 bg-white/90 px-2 backdrop-blur-xl"> <a href="/guardia/escaner" class="flex w-20 flex-col items-center justify-center rounded-xl px-2 py-2 text-[10px] font-bold uppercase tracking-[0.08em] transition bg-[#eeeeee] text-[#213138]"> <span class="material-symbols-outlined mb-1">shield</span> <span>Seguridad</span> </a><a href="/residente/nuevo-pase" class="flex w-20 flex-col items-center justify-center rounded-xl px-2 py-2 text-[10px] font-bold uppercase tracking-[0.08em] transition text-[#7a7e82] hover:text-[#213138]"> <span class="material-symbols-outlined mb-1">key</span> <span>Acceso</span> </a><a href="/admin/bitacora" class="flex w-20 flex-col items-center justify-center rounded-xl px-2 py-2 text-[10px] font-bold uppercase tracking-[0.08em] transition text-[#7a7e82] hover:text-[#213138]"> <span class="material-symbols-outlined mb-1">history</span> <span>Bitacora</span> </a> </nav> </div> </body></html> <script>
  const accessButtons = Array.from(document.querySelectorAll(".access-toggle"));
  const qrButtons = Array.from(document.querySelectorAll(".qr-toggle"));
  const actionLabel = document.getElementById("action-label");
  const statusTitle = document.getElementById("status-title");
  const statusChip = document.getElementById("status-chip");
  const accessAction = document.getElementById("access-action");
  const cameraPermission = document.getElementById("camera-permission");
  const cameraStatus = document.getElementById("camera-status");
  const cameraVideo = document.getElementById("camera-video");
  const cameraFallback = document.getElementById("camera-fallback");

  let accessType = "entrada";
  let qrState = "valido";

  const normalizeState = (value) => (value === "invalid" ? "invalido" : "valido");
  const normalizeType = (value) => (value === "salida" ? "salida" : "entrada");

  const readStateFromUrl = () => {
    const params = new URLSearchParams(window.location.search);
    qrState = normalizeState(params.get("state"));
    accessType = normalizeType(params.get("type"));
  };

  const syncUrlFromState = () => {
    const params = new URLSearchParams(window.location.search);
    params.set("state", qrState === "valido" ? "valid" : "invalid");
    params.set("type", accessType);
    const next = `${window.location.pathname}?${params.toString()}`;
    window.history.replaceState(null, "", next);
  };

  const setCameraStatus = (message, isError = false) => {
    if (!cameraStatus) return;
    cameraStatus.textContent = message;
    cameraStatus.className = `mt-2 text-center text-xs font-semibold ${isError ? "text-[#93000a]" : "text-[#5f6368]"}`;
  };

  const requestCamera = async () => {
    if (!(cameraVideo instanceof HTMLVideoElement)) return;
    if (!navigator.mediaDevices?.getUserMedia) {
      setCameraStatus("Tu navegador no soporta camara.", true);
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" }
        },
        audio: false
      });
      cameraVideo.srcObject = stream;
      cameraVideo.classList.remove("hidden");
      if (cameraFallback instanceof HTMLImageElement) {
        cameraFallback.classList.add("hidden");
      }
      setCameraStatus("Camara activa (modo escaner).");
      if (cameraPermission) {
        cameraPermission.textContent = "Camara activa";
        cameraPermission.className = "h-10 w-full rounded-lg bg-[#006d36] text-sm font-semibold text-white";
      }
    } catch {
      setCameraStatus("Permiso denegado o camara no disponible.", true);
    }
  };

  const render = () => {
    accessButtons.forEach((button) => {
      const active = button.getAttribute("data-access-type") === accessType;
      button.className = `access-toggle h-11 rounded-lg text-base font-semibold ${
        active ? "bg-[#213138] text-white" : "bg-[#eeeeee] text-[#213138]"
      }`;
    });

    qrButtons.forEach((button) => {
      const active = button.getAttribute("data-qr-state") === qrState;
      const validPalette = active && qrState === "valido";
      const invalidPalette = active && qrState === "invalido";
      button.className = `qr-toggle h-11 rounded-lg text-base font-semibold ${
        validPalette
          ? "bg-[#006d36] text-white"
          : invalidPalette
            ? "bg-[#93000a] text-white"
            : "bg-[#eeeeee] text-[#5f6368]"
      }`;
    });

    if (!actionLabel || !statusTitle || !statusChip || !accessAction) return;

    actionLabel.textContent = accessType === "entrada" ? "Registrar entrada" : "Registrar salida";
    if (qrState === "valido") {
      statusTitle.textContent = "Visitante Autorizado";
      statusChip.className = "mb-5 flex items-center gap-2 rounded-xl bg-[#83fba5]/20 p-3 text-[#006d36]";
      accessAction.setAttribute("href", "/admin/detalle-movimiento");
      accessAction.className =
        "mt-6 flex h-14 w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-b from-[#006d36] to-[#005227] text-2xl font-semibold text-white";
    } else {
      statusTitle.textContent = "Acceso no autorizado";
      statusChip.className = "mb-5 flex items-center gap-2 rounded-xl bg-[#ffdad6] p-3 text-[#93000a]";
      accessAction.setAttribute("href", "/guardia/acceso-denegado");
      accessAction.className =
        "mt-6 flex h-14 w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-b from-[#93000a] to-[#ba1a1a] text-2xl font-semibold text-white";
    }
    syncUrlFromState();
  };

  accessButtons.forEach((button) => {
    button.addEventListener("click", () => {
      accessType = button.getAttribute("data-access-type") ?? "entrada";
      render();
    });
  });

  qrButtons.forEach((button) => {
    button.addEventListener("click", () => {
      qrState = button.getAttribute("data-qr-state") ?? "valido";
      render();
    });
  });

  cameraPermission?.addEventListener("click", () => {
    requestCamera();
  });

  readStateFromUrl();
  render();
</script>
