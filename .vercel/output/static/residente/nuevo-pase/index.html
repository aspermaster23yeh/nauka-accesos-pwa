<!DOCTYPE html><html lang="es-MX"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#f9f9f9"><title>Nuevo Acceso - Nauka Nayarit</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet"><link rel="stylesheet" href="/_astro/bitacora.vXGZMmTY.css">
<link rel="stylesheet" href="/_astro/bitacora.p_7ZI5Ig.css"></head> <body class="min-h-screen bg-[#f9f9f9] text-[#1a1c1c]"> <div class="mx-auto flex min-h-[100dvh] w-full max-w-[430px] flex-col bg-[#f9f9f9]"> <header class="sticky top-0 z-40 flex items-center justify-between border-b border-[#ececec] bg-white/90 px-4 py-3 backdrop-blur"> <a href="/residente/inicio" class="grid h-10 w-10 place-items-center rounded-full text-[#213138] transition hover:bg-[#eeeeee]"> <span class="material-symbols-outlined">arrow_back</span> </a> <h2 class="text-lg font-bold tracking-tight text-[#213138]">Nuevo Acceso</h2> <span class="h-10 w-10"></span> </header> <main class="flex-1 px-4 pb-6 pt-4">   <section class="rounded-[14px] bg-white p-5 shadow-[0_8px_24px_rgba(26,28,28,0.06)]"> <form id="pass-form" class="space-y-6"> <label class="block space-y-2"> <span class="text-3xl font-medium text-[#213138]">Nombre del Visitante</span> <input id="visitor-name" class="h-14 w-full rounded-xl bg-[#f3f3f4] px-4 text-xl outline-none focus:ring-2 focus:ring-[#213138]/25" placeholder="Ej. Juan Pérez"> </label> <label class="block space-y-2"> <span class="text-3xl font-medium text-[#213138]">Fecha de Visita</span> <input type="date" class="h-14 w-full rounded-xl bg-[#f3f3f4] px-4 text-xl outline-none focus:ring-2 focus:ring-[#213138]/25"> </label> <label class="block space-y-2"> <span class="text-3xl font-medium text-[#213138]">Hora Aproximada</span> <input type="time" class="h-14 w-full rounded-xl bg-[#f3f3f4] px-4 text-xl outline-none focus:ring-2 focus:ring-[#213138]/25"> </label> <label class="block space-y-2"> <span class="text-3xl font-medium text-[#213138]">Motivo</span> <select id="visit-reason" class="h-14 w-full rounded-xl bg-[#f3f3f4] px-4 text-xl outline-none focus:ring-2 focus:ring-[#213138]/25"> <option>Seleccione un motivo</option> <option>Visita</option> <option>Proveedor</option> <option>Mantenimiento</option> </select> </label> <button id="generate-pass" type="button" class="flex h-14 w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-b from-[#213138] to-[#37474f] text-2xl font-semibold text-white"> <span class="material-symbols-outlined">qr_code_2</span>
Generar y Compartir
</button> </form> <div id="generated-pass" class="mt-6 rounded-xl bg-[#eeeeee] p-6 text-center"> <div class="mx-auto grid h-52 w-52 place-items-center rounded-xl bg-white shadow-sm"> <span class="material-symbols-outlined text-8xl text-[#37474f]">qr_code_2</span> </div> <p id="generated-label" class="mt-4 text-sm font-bold uppercase tracking-[0.08em] text-[#5f6368]">Codigo temporal generado</p> <button id="share-whatsapp" type="button" class="mt-4 h-14 w-full rounded-xl bg-[#25D366]/15 text-2xl font-semibold text-[#005227]">Compartir por WhatsApp</button> </div> </section>  </main>  </div> </body></html> <script>
  const generateButton = document.getElementById("generate-pass");
  const shareButton = document.getElementById("share-whatsapp");
  const generatedLabel = document.getElementById("generated-label");
  const generatedPass = document.getElementById("generated-pass");
  const visitorName = document.getElementById("visitor-name");
  const visitReason = document.getElementById("visit-reason");

  let currentCode = "";

  const createCode = () => {
    const seed = Math.random().toString(36).slice(2, 8).toUpperCase();
    return `NK-${seed}`;
  };

  generateButton?.addEventListener("click", () => {
    currentCode = createCode();
    if (generatedLabel) {
      generatedLabel.textContent = `Codigo temporal generado: ${currentCode}`;
    }
    if (generatedPass) {
      generatedPass.classList.add("ring-2", "ring-[#213138]/15");
    }
  });

  shareButton?.addEventListener("click", () => {
    const name = visitorName instanceof HTMLInputElement ? visitorName.value || "Visitante" : "Visitante";
    const reason = visitReason instanceof HTMLSelectElement ? visitReason.value || "Visita" : "Visita";
    const code = currentCode || createCode();
    const text = `Pase Nauka Nayarit%0AVisitante: ${encodeURIComponent(name)}%0AMotivo: ${encodeURIComponent(reason)}%0ACodigo QR: ${encodeURIComponent(code)}`;
    window.open(`https://wa.me/?text=${text}`, "_blank", "noopener,noreferrer");
  });
</script>
