<!DOCTYPE html><html lang="es-MX"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><meta name="theme-color" content="#f9f9f9"><title>Pase Demo - Nauka Nayarit</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet"><link rel="stylesheet" href="/_astro/bitacora.BOznGf1m.css">
<link rel="stylesheet" href="/_astro/bitacora.B6-kdUH5.css"></head> <body class="min-h-screen bg-[#f9f9f9] text-[#1a1c1c]"> <div class="mx-auto flex min-h-[100dvh] w-full max-w-[430px] flex-col bg-[#f9f9f9]"> <header class="sticky top-0 z-40 flex items-center justify-between border-b border-[#ececec] bg-white/90 px-4 py-3 backdrop-blur"> <a href="/residente/nuevo-pase" class="grid h-10 w-10 place-items-center rounded-full text-[#213138] transition hover:bg-[#eeeeee]"> <span class="material-symbols-outlined">arrow_back</span> </a> <h2 class="text-lg font-bold tracking-tight text-[#213138]">Pase generado</h2> <span class="h-10 w-10"></span> </header> <main class="flex-1 px-4 pb-6 pt-4">   <section class="rounded-[14px] bg-white p-5 shadow-[0_8px_24px_rgba(26,28,28,0.06)]"> <h1 class="text-3xl font-extrabold tracking-tight text-[#213138]">Pase digital para caseta</h1> <p id="pass-meta" class="mt-1 text-sm text-[#5f6368]">Codigo: --</p> <div class="mt-5 rounded-xl bg-[#eeeeee] p-5 text-center"> <img id="qr-image" alt="QR de pase" class="mx-auto h-56 w-56 rounded-xl bg-white p-2 shadow-sm"> <p id="guard-link" class="mt-3 break-all text-xs font-semibold text-[#37474f]"></p> </div> <div class="mt-4 space-y-3"> <button id="share-image" type="button" class="h-12 w-full rounded-xl bg-[#25D366]/15 text-base font-semibold text-[#005227]">
Compartir imagen (WhatsApp)
</button> <button id="download-pdf" type="button" class="h-12 w-full rounded-xl bg-gradient-to-b from-[#213138] to-[#37474f] text-base font-semibold text-white">
Descargar PDF
</button> </div> </section>  </main>  </div> </body></html> <script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code") || "NK-DEMO01";
  const state = params.get("state") === "invalid" ? "invalid" : "valid";
  const type = params.get("type") === "salida" ? "salida" : "entrada";
  const guardUrl = `${window.location.origin}/guardia/escaner?state=${state}&type=${type}&code=${encodeURIComponent(code)}`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=520x520&data=${encodeURIComponent(guardUrl)}`;

  const qrImage = document.getElementById("qr-image");
  const passMeta = document.getElementById("pass-meta");
  const guardLink = document.getElementById("guard-link");
  const shareImageButton = document.getElementById("share-image");
  const downloadPdfButton = document.getElementById("download-pdf");

  if (qrImage instanceof HTMLImageElement) qrImage.src = qrUrl;
  if (passMeta) passMeta.textContent = `Codigo: ${code} · Estado: ${state} · Tipo: ${type}`;
  if (guardLink) guardLink.textContent = guardUrl;

  const fetchQrFile = async () => {
    const response = await fetch(qrUrl);
    const blob = await response.blob();
    return new File([blob], `pase-${code}.png`, { type: "image/png" });
  };

  shareImageButton?.addEventListener("click", async () => {
    try {
      const file = await fetchQrFile();
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          title: "Pase Nauka Nayarit",
          text: `Pase ${code}`,
          files: [file]
        });
        return;
      }
    } catch {
      // fall through to text-only WhatsApp link
    }
    const text = `Pase Nauka Nayarit%0ACodigo: ${encodeURIComponent(code)}%0AValidar: ${encodeURIComponent(guardUrl)}`;
    window.open(`https://wa.me/?text=${text}`, "_blank", "noopener,noreferrer");
  });

  downloadPdfButton?.addEventListener("click", () => {
    window.print();
  });
</script>
